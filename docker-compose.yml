version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: traiding_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: traiding_user
      POSTGRES_PASSWORD: traiding_pass
      POSTGRES_DB: traiding_db
    ports:
      - "8083:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U traiding_user -d traiding_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: traiding_postgres_data
